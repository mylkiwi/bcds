name: ssq-tool

services:
  app:
    # 本地开发：用当前目录的 Dockerfile 构建本地镜像
    build: .
    image: ssq:local
    ports:
      - "8081:80"
    environment:
      TZ: Asia/Shanghai
      BARK_KEY: ${BARK_KEY}
      BARK_SOUND: ${BARK_SOUND:-minuet}
      SSQ_ADMIN_TOKEN: ${SSQ_ADMIN_TOKEN}
    restart: unless-stopped
